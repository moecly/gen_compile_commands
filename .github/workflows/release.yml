name: Release

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            platform: linux-x64
            suffix: linux
          - os: windows-latest
            platform: windows-x64
            suffix: exe
          - os: macos-latest
            platform: macos-x64
            suffix: macos

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Install PyInstaller
        run: pip install pyinstaller

      - name: Build on ${{ matrix.platform }}
        shell: pwsh
        run: |
          pyinstaller --onefile gen_compile_commands.py --name gen_compile_commands-${{ matrix.suffix }}
          if (Test-Path "dist/gen_compile_commands.exe") {
            Rename-Item "dist/gen_compile_commands.exe" "gen_compile_commands-exe"
          }

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: gen_compile_commands-${{ matrix.suffix }}
          path: dist/gen_compile_commands-${{ matrix.suffix }}

  release:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Display structure of downloaded files
        run: ls -R artifacts

      - name: Prepare artifacts
        run: |
          mkdir -p release-files
          cp artifacts/gen_compile_commands-linux/* release-files/ 2>/dev/null || true
          cp artifacts/gen_compile_commands-exe/* release-files/ 2>/dev/null || true
          cp artifacts/gen_compile_commands-macos/* release-files/ 2>/dev/null || true
          mv release-files/gen_compile_commands-linux release-files/gen_compile_commands-linux 2>/dev/null || true
          mv release-files/gen_compile_commands-exe release-files/gen_compile_commands.exe 2>/dev/null || true
          mv release-files/gen_compile_commands-macos release-files/gen_compile_commands-macos 2>/dev/null || true
          ls -la release-files/

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            release-files/gen_compile_commands-linux
            release-files/gen_compile_commands.exe
            release-files/gen_compile_commands-macos
          generate_release_notes: true
