name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            platform: linux-x64
            suffix: linux
          - os: windows-latest
            platform: windows-x64
            suffix: exe
          - os: macos-latest
            platform: macos-x64
            suffix: macos

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Install PyInstaller
        run: pip install pyinstaller

      - name: Build on ${{ matrix.platform }}
        run: pyinstaller --onefile gen_compile_commands.py --name gen_compile_commands-${{ matrix.suffix }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: gen_compile_commands-${{ matrix.suffix }}
          path: dist/gen_compile_commands-${{ matrix.suffix }}

  release:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Display structure of downloaded files
        run: ls -R artifacts

      - name: Prepare artifacts
        run: |
          cd artifacts
          for dir in */; do
            mv "$dir"* . 2>/dev/null || true
          done
          ls -la

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            artifacts/gen_compile_commands-linux
            artifacts/gen_compile_commands.exe
            artifacts/gen_compile_commands-macos
          generate_release_notes: true
