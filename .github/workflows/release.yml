name: CI

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  push:
    branches:
      - main
      - feature/dev
    tags:
      - 'v*'
  pull_request:
    branches:
      - main

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Install pytest
        run: pip install pytest

      - name: Run tests
        run: pytest -v

  build:
    needs: test
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            platform: linux-x64
            name: linux-x64
          - os: windows-latest
            platform: windows-x64
            name: windows-x64
          - os: macos-latest
            platform: macos-arm64
            name: macos-arm64

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Install PyInstaller
        run: pip install pyinstaller

      - name: Build on ${{ matrix.platform }}
        shell: pwsh
        run: |
          pyinstaller --onefile gen_compile_commands.py --name gen_compile_commands-${{ matrix.name }}
          $exeFile = Get-ChildItem -Path "dist" -Filter "*.exe" -File | Select-Object -First 1
          if ($exeFile) {
            Move-Item -Path $exeFile.FullName -Destination "dist/gen_compile_commands-${{ matrix.name }}"
          }

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: gen_compile_commands-${{ matrix.name }}
          path: dist/gen_compile_commands-${{ matrix.name }}

  release:
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Display structure of downloaded files
        run: ls -R artifacts

      - name: Prepare artifacts
        run: |
          mkdir -p release-files
          for dir in artifacts/*/; do
            cp "$dir"* release-files/ 2>/dev/null || true
          done
          cd release-files
          [ -f "gen_compile_commands-windows-x64" ] && mv gen_compile_commands-windows-x64 gen_compile_commands-windows-x64.exe || true
          ls -la

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            release-files/gen_compile_commands-linux-x64
            release-files/gen_compile_commands-windows-x64.exe
            release-files/gen_compile_commands-macos-arm64
          generate_release_notes: true
